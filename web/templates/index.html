<div class="glass-card">

    <div class="hero">

        <h1>MarkItDown</h1>

        <div class="subtitle">
            by Microsoft
        </div>

    </div>

    <div id="dropzone">

        <div class="drop-icon">
            ⬆
        </div>

        <div class="drop-title">
            Upload Document
        </div>

        <input id="fileInput" type="file">

        <div id="selectedFile">
            No file selected
        </div>

        <div id="fileMeta"></div>

    </div>

    <button id="convertBtn">
        Convert
    </button>

    <div id="progressContainer">

        <div class="progress-track">
            <div id="progressBar"></div>
        </div>

    </div>

</div>

<div class="glass-card">

    <div class="result-header">

        <h2>Markdown Output</h2>

        <div class="actions">

            <button id="copyBtn">
                Copy
            </button>

            <button id="downloadBtn">
                Download .md
            </button>

        </div>

    </div>

    <textarea id="output"></textarea>

</div>
