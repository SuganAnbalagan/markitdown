<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MarkItDown</title>

<link rel="stylesheet" href="/static/app.css">
</head>

<body>

<div class="background"></div>

<div class="container">

    <div class="glass-card">

        <div class="hero">

            <h1>MarkItDown</h1>

            <p>
                Convert documents into Markdown
            </p>

        </div>

        <div id="dropzone">

            <div class="drop-icon">
                ⬆️
            </div>

            <div class="drop-title">
                Drag & Drop File
            </div>

            <div class="drop-subtitle">
                or click below
            </div>

            <input id="fileInput" type="file">

            <div id="selectedFile" class="filename">
                No file selected
            </div>

            <div id="fileMeta"></div>

        </div>

        <button id="convertBtn">
            Convert
        </button>

        <div id="progressContainer">

            <div class="progress-track">
                <div id="progressBar" class="progress-bar"></div>
            </div>

            <div class="progress-row">
                <span id="statusText">
                    Waiting
                </span>

                <span id="progressText">
                    0%
                </span>
            </div>

            <div class="progress-row">
                <span id="speedText">
                    —
                </span>

                <span id="timerText">
                    0s
                </span>
            </div>

        </div>

    </div>

    <div class="glass-card">

        <div class="result-header">

            <h2>Markdown Output</h2>

            <div>

                <button id="copyBtn">
                    Copy
                </button>

                <button id="downloadBtn">
                    Download .md
                </button>

            </div>

        </div>

        <textarea
            id="output"
            placeholder="Converted markdown appears here..."
        ></textarea>

    </div>

    <div class="glass-card">

        <h2>
            Recent Conversions
        </h2>

        <div id="history"></div>

    </div>

</div>

<script src="/static/app.js"></script>

</body>

</html>
